# Generated by `patchdock init`.

# Per-container limits. Each pipeline stage runs in its own container and is
# governed by these.
container:
  # Wall-clock ceiling for a single container. When it elapses the container is
  # killed and the stage fails. Accepts Go duration strings: "90s", "10m", "1h".
  # Set to 0 for no wall-clock limit.
  timeout: 10m

  # Maximum tokens a single container may spend. Set to 0 for no token limit.
  token_budget: 100000

  # Maximum number of containers running at once across a fan-out. Set to 0 for no limit.
  max_containers: 4

# How many times the executor may be re-run after the reviewer rejects, before
# the run gives up. Set to 0 for unlimited retries.
retries:
  max: 1

# Which filepath drives each stage
stages:
  planner: planner.ts
  executor: executor.ts
  reviewer: reviewer.ts
